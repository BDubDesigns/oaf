name: OAF CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      # actions/checkout v4.2.2
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      # actions/setup-node v4.4.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version-file: .node-version
      - name: Activate pinned pnpm
        run: |
          corepack enable
          corepack install
          pnpm --version
      - name: Install frozen dependencies
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm typecheck
      - name: Test all suites
        run: pnpm test
      - name: CLI help
        run: node bin/oaf.mjs --help
      - name: Generated app doctor
        working-directory: tests/fixtures/generated-app
        run: node ../../../bin/oaf.mjs doctor
      - name: Native TypeScript smoke
        run: node tests/fixtures/node24-native-ts-smoke.ts
      - name: Verify no generated output or tracked changes
        run: |
          git diff --exit-code
          test ! -e dist
          test ! -e build
          test ! -e out
          test ! -e coverage
